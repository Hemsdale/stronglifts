<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>5×5 Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f4f4f4;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  min-height:100vh;max-width:480px;margin:0 auto;padding:16px 16px 40px;-webkit-tap-highlight-color:transparent}
.logo{font-size:44px;font-weight:900;color:#f97316;letter-spacing:-2px;text-align:center}
.subtitle{font-size:17px;letter-spacing:6px;color:#666;font-weight:600;text-align:center;margin-top:4px}
h1{font-size:20px;font-weight:800;letter-spacing:2px;margin-bottom:8px}
.card{background:#111;border:1px solid #222;border-radius:12px;padding:18px;margin-bottom:14px}
.card.active{border:2px solid #f97316}
.card.done{border-color:#4ade8033}
.card.dim{opacity:0.4}
.btn{display:block;width:100%;padding:18px;background:#f97316;color:#0a0a0a;border:none;border-radius:12px;
  font-size:18px;font-weight:800;letter-spacing:1.5px;cursor:pointer;font-family:inherit;margin-top:10px;text-align:center}
.btn.green{background:#4ade80}
.btn.ghost{background:none;border:1px solid #333;color:#888;padding:12px 18px;border-radius:8px;
  font-size:14px;width:auto;display:inline-block;margin:4px}
.btn.ghost.green{color:#4ade80;border-color:#4ade8044}
.btn.ghost.red{color:#ef4444;border-color:#ef444444}
.btn.ghost.sm{padding:8px 14px;font-size:13px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.row.border{border-top:1px solid #1a1a1a}
.label{font-size:13px;letter-spacing:2px;color:#666;margin-bottom:4px}
.tag{font-size:22px;font-weight:800;color:#f97316}
.exname{font-size:18px;font-weight:800}
.exdet{font-size:15px;color:#777;margin-top:3px}
.plates{font-size:13px;color:#555;margin-top:2px}
.dots{display:flex;gap:10px;margin-top:8px}
.dot{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;border:2px solid transparent}
.dot.g{background:#4ade80;color:#0a0a0a}.dot.o{background:#f97316;color:#0a0a0a}
.dot.r{background:#ef4444;color:#0a0a0a}.dot.empty{background:#1a1a1a}
.dot.cur{background:#333;border-color:#f97316}
.warmbar{display:flex;align-items:center;margin-bottom:8px;gap:3px}
.warmbar .pip{width:12px;height:12px;border-radius:3px;background:#1a1a1a;border:1px solid #333}
.warmbar .pip.done{background:#555}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;
  justify-content:center;z-index:100;padding:20px}
.modal{text-align:center;width:100%;max-width:340px}
.modal .title{font-size:17px;letter-spacing:4px;color:#666;margin-bottom:20px;font-weight:700}
.modal .exname{font-size:22px;color:#f97316;margin-bottom:6px}
.modal .big{font-size:44px;font-weight:900}
.modal .med{font-size:18px;color:#f97316;font-weight:700;margin-top:6px}
.modal .sub{font-size:14px;color:#888;margin-top:2px}
.modal .platesbox{margin-top:10px;padding:8px 12px;background:#1a1a1a;border-radius:8px;display:inline-block}
.modal .platesbox .lbl{font-size:14px;color:#888;letter-spacing:1px}
.modal .platesbox .val{font-size:16px;color:#ccc;font-weight:600;margin-top:2px}
.reprow{display:flex;gap:6px;justify-content:center;margin:14px 0}
.repbtn{width:46px;height:46px;border-radius:10px;border:2px solid #333;font-size:20px;font-weight:800;
  cursor:pointer;font-family:inherit;background:#1e1e1e;color:#888}
.repbtn.sel{background:#4ade80;color:#0a0a0a;border-color:#4ade80}
.repbtn.sel.partial{background:#f97316;border-color:#f97316}
.diffrow{display:flex;gap:10px;justify-content:center;margin:14px 0}
.diffbtn{flex:1;max-width:100px;padding:12px 8px;border-radius:12px;border:2px solid #333;font-size:15px;
  cursor:pointer;font-family:inherit;background:#1e1e1e;color:#777}
.diffbtn.sel{font-weight:900;color:#0a0a0a}
.adjrow{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
.adjbtn{background:none;border:1px solid #f9731644;color:#f97316;padding:8px 14px;border-radius:8px;
  font-size:20px;font-weight:900;cursor:pointer;font-family:inherit}
.ring-wrap{position:relative;display:inline-block;margin-bottom:20px}
.ring-digits{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:900}
.nextbox{background:#1a1a1a;border-radius:10px;padding:12px;margin-top:8px;text-align:left}
.nextbox .nlabel{font-size:13px;color:#666;letter-spacing:1px;margin-bottom:4px}
.nextbox .nexname{font-size:17px;font-weight:800}
.nextbox .nset{font-size:14px;color:#888;margin-top:2px}
.nextbox .nwt{font-size:24px;font-weight:900;color:#f97316;margin-top:6px}
.nextbox .nplates{font-size:13px;color:#555;margin-top:4px}
.status{text-align:center;padding:10px 14px;background:#111;border-radius:8px;border:1px solid #222;margin-top:12px;font-size:14px}
.status.ok{color:#4ade80}.status.err{color:#ef4444}.status.info{color:#777}
.overview{margin-top:24px;background:#111;border-radius:12px;padding:18px;border:1px solid #1a1a1a}
.legend{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:16px;margin-bottom:16px}
textarea{width:100%;min-height:80px;background:#1a1a1a;color:#f4f4f4;border:1px solid #333;border-radius:8px;
  padding:10px;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box}
.histcard{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:16px;margin-bottom:12px}
.sumcard{background:#111;border-radius:12px;padding:16px;margin-bottom:10px}
.difftag{font-size:14px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block}
.sdot{width:34px;height:34px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#0a0a0a}
.sdot.g{background:#4ade80}.sdot.o{background:#f97316}.sdot.r{background:#ef4444}
.diflabel{font-size:12px;margin-top:2px}
.hidden{display:none}
@media(prefers-color-scheme:dark){:root{color-scheme:dark}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const EXERCISES={A:["Squat","Bench Press","Barbell Row"],B:["Squat","Overhead Press","Deadlift"]};
const SETS_REPS={Squat:{sets:5,reps:5},"Bench Press":{sets:5,reps:5},"Barbell Row":{sets:5,reps:5},"Overhead Press":{sets:5,reps:5},Deadlift:{sets:1,reps:5}};
const INCREMENT={Squat:5,"Bench Press":5,"Barbell Row":5,"Overhead Press":5,Deadlift:10};
const DEFAULT_WEIGHTS={Squat:45,"Bench Press":45,"Barbell Row":65,"Overhead Press":45,Deadlift:95};
const BAR=45,DELOAD=0.9,MAX_FAILS=3,REST_WORK=120,REST_WARMUP=60,SKEY="5x5-tracker-data";
const RACK=[65,95,135,185,225,275,315,365,405,455,495];
const DC={easy:"#4ade80",ok:"#f97316",hard:"#ef4444"};
const DL={easy:"EASY",ok:"OK",hard:"HARD"};
const DI={easy:"🟢",ok:"🟡",hard:"🔴"};
const DM={easy:2,ok:1,hard:0.5};

// ═══════════════════════════════════════════
// UTIL
// ═══════════════════════════════════════════
const r5=n=>Math.round(n/5)*5;
const fmtT=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;
const today=()=>new Date().toISOString().slice(0,10);
function domDiff(a){if(!a||!a.length)return"ok";const c={easy:0,ok:0,hard:0};a.forEach(r=>c[r]++);
  if(c.hard>=Math.ceil(a.length/2))return"hard";if(c.easy>a.length/2)return"easy";return"ok";}
function plates(t){if(t<=BAR)return"empty bar";let rem=(t-BAR)/2;const ps=[45,35,25,10,5,2.5],res=[];
  for(const p of ps)while(rem>=p){res.push(p);rem-=p;}if(!res.length)return"empty bar";
  const ct={};res.forEach(p=>ct[p]=(ct[p]||0)+1);
  return Object.entries(ct).map(([p,c])=>c>1?`${c}×${p}`:`${p}`).join(" + ")+" /side";}
function loadInfo(w){return w<=BAR?"Empty bar":`${BAR} lb bar + ${plates(w)}`;}
function buildWarmup(wt,ex){
  // Deadlift: starts at 135 (needs plates for floor height), only 1×5 working set
  // Warmup IS your volume. Hit every rack stop, no jumps > ~50lb, reps taper down.
  if(ex==="Deadlift"||ex==="Barbell Row"){
    const minStart=ex==="Deadlift"?135:65;// Rows can start lighter
    if(wt<=minStart)return[];
    const s=[];
    // All rack stops from minStart up to (but not including) working weight
    const stops=RACK.filter(w=>w>=minStart&&w<wt);
    if(!stops.length){s.push({weight:minStart,reps:5});return s;}
    // Fill gaps: if any jump between consecutive stops > 50lb, add midpoint
    const filled=[stops[0]];
    for(let i=1;i<stops.length;i++){
      if(stops[i]-filled[filled.length-1]>50){
        filled.push(r5((filled[filled.length-1]+stops[i])/2));
      }
      filled.push(stops[i]);
    }
    // Assign reps: position-based taper
    // Short ramps (1-2 sets): all 5 reps
    // Longer ramps: 5s early, 3s middle, 2s near working weight
    filled.forEach((w,i)=>{
      const remaining=filled.length-i;
      let reps=5;
      if(filled.length>=4&&remaining<=2)reps=2;
      else if(filled.length>=3&&remaining===1)reps=2;
      else if(filled.length>=3&&remaining<=Math.ceil(filled.length/2))reps=3;
      s.push({weight:w,reps});
    });
    return s;
  }
  // All other lifts: standard warmup
  if(wt<=BAR)return[];const s=[{weight:BAR,reps:5}];if(wt<100)return s;
  if(wt<200){const cap=wt*0.75,av=RACK.filter(w=>w>BAR&&w<=cap);
    if(av.length)s.push({weight:av[av.length-1],reps:5});return s;}
  const cap=wt*0.85,av=RACK.filter(w=>w>BAR&&w<=cap);if(!av.length)return s;
  let pk;if(av.length<=3)pk=av;else{pk=[av[0],av[Math.floor(av.length/2)],av[av.length-1]];pk=[...new Set(pk)];}
  [5,3,2].forEach((r,i)=>{if(pk[i])s.push({weight:pk[i],reps:r});});return s;}
function freshState(){return{nextWorkout:"A",weights:{...DEFAULT_WEIGHTS},
  failCounts:{Squat:0,"Bench Press":0,"Barbell Row":0,"Overhead Press":0,Deadlift:0},
  history:[],workoutNumber:1,setupDone:false};}

// ═══════════════════════════════════════════
// STORAGE (localStorage — profile-based)
// ═══════════════════════════════════════════
const PROFILES_KEY="5x5-profiles";
function getProfiles(){try{return JSON.parse(localStorage.getItem(PROFILES_KEY))||[];}catch{return[];}}
function saveProfiles(list){localStorage.setItem(PROFILES_KEY,JSON.stringify(list));}
let currentProfile="default";
function profileKey(){return SKEY+"-"+currentProfile;}
function save(st){try{localStorage.setItem(profileKey(),JSON.stringify(st));return true;}catch(e){console.error(e);return false;}}
function load(){
  // Try profile key first
  try{const d=localStorage.getItem(profileKey());if(d){const p=JSON.parse(d);
    return{...freshState(),...p,weights:{...DEFAULT_WEIGHTS,...(p.weights||{})},
      failCounts:{...freshState().failCounts,...(p.failCounts||{})}};}
  }catch(e){console.error(e);}
  // Migrate from old non-profile key
  if(currentProfile==="default"){
    try{const d=localStorage.getItem(SKEY);if(d){const p=JSON.parse(d);
      const migrated={...freshState(),...p,weights:{...DEFAULT_WEIGHTS,...(p.weights||{})},
        failCounts:{...freshState().failCounts,...(p.failCounts||{})}};
      localStorage.setItem(profileKey(),JSON.stringify(migrated));
      return migrated;}}catch{}
  }
  return null;
}
function switchProfile(name){
  currentProfile=name;S=load()||freshState();
  view=S.setupDone?"home":"setup";exIdx=0;warmupIdx=0;setsLog=[];modal=null;summaryData=null;
  render();
}
function createProfile(){
  const name=prompt("Enter profile name:");
  if(!name||!name.trim())return;
  const clean=name.trim().toLowerCase().replace(/[^a-z0-9]/g,"-");
  const profiles=getProfiles();
  if(!profiles.includes(clean)){profiles.push(clean);saveProfiles(profiles);}
  switchProfile(clean);
}
function deleteProfile(){
  if(currentProfile==="default"){alert("Can't delete default profile");return;}
  if(!confirm(`Delete profile "${currentProfile}" and all its data?`))return;
  localStorage.removeItem(profileKey());
  const profiles=getProfiles().filter(p=>p!==currentProfile);
  saveProfiles(profiles);switchProfile("default");
}

// ═══════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════
// Ensure default profile exists
{const p=getProfiles();if(!p.includes("default")){p.unshift("default");saveProfiles(p);}}
let S=load()||freshState();
let view="home",exIdx=0,warmupIdx=0,setsLog=[],modal=null,summaryData=null;
let timerInterval=null,timerLeft=0,statusMsg="";
// temp state for modals
let mReps=5,mDiff="ok",mWt=0;

function persist(){save(S);render();}

// ═══════════════════════════════════════════
// NAVIGATION STACK (history API for back button)
// ═══════════════════════════════════════════
let navDepth=0; // Track how many states we've pushed
function navPush(){navDepth++;history.pushState({d:navDepth},""," ");}
function setView(v){
  view=v;
  if(v!=="home")navPush();
  render();
}

function isWorkoutActive(){return view==="workout"||view==="summary";}

// Save/load in-progress workout
function saveProgress(){
  if(!isWorkoutActive())return;
  try{localStorage.setItem(profileKey()+"-progress",JSON.stringify({
    exIdx,warmupIdx,setsLog,workout:S.nextWorkout,workoutNumber:S.workoutNumber,
    view,timestamp:Date.now()
  }));}catch{}
}
function loadProgress(){
  try{const d=localStorage.getItem(profileKey()+"-progress");
    if(!d)return null;const p=JSON.parse(d);
    if(Date.now()-p.timestamp>4*60*60*1000){clearProgress();return null;}
    return p;
  }catch{return null;}
}
function clearProgress(){try{localStorage.removeItem(profileKey()+"-progress");}catch{}}

// Handle back gesture / hardware back
function handleBack(){
  // 1. Any overlay modal open → close it
  if(modal){
    if(modal==="timer"){skipTimer();}
    else{modal=null;}
    navPush();render();return;
  }
  // 2. Workout or summary → save progress, go home
  if(view==="workout"){saveProgress();view="home";navPush();render();return;}
  if(view==="summary"){saveProgress();view="home";navPush();render();return;}
  // 3. History/setup → go home
  if(view==="history"||view==="setup"){view="home";navPush();render();return;}
  // 4. Home → close app
}

window.addEventListener('popstate',e=>{
  // Only intercept if we have states to unwind
  if(navDepth>0){navDepth--;handleBack();}
});

// Refresh / close tab — save progress
window.addEventListener('beforeunload',e=>{
  if(isWorkoutActive()){saveProgress();}
});

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
const $=id=>document.getElementById(id);
const app=()=>document.getElementById("app");

function render(){
  if(!S.setupDone&&view!=="setup"){view="setup";}
  if(view==="setup")renderSetup();
  else if(view==="history")renderHistory();
  else if(view==="summary")renderSummary();
  else if(view==="workout")renderWorkout();
  else renderHome();
}

// ═══════════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════════
function renderSetup(){
  const exs=Object.keys(DEFAULT_WEIGHTS);
  app().innerHTML=`
    <div style="text-align:center;margin-bottom:28px">
      <div class="logo">5×5</div>
      <h1>SET YOUR STARTING WEIGHTS</h1>
      <p style="font-size:15px;color:#f97316;margin-bottom:4px">Profile: ${currentProfile}</p>
      <p style="font-size:15px;color:#777">New lifter? Use defaults. Returning? Enter a weight you can do for 10 reps.</p>
    </div>
    ${exs.map(ex=>`
      <div class="row border">
        <span style="font-size:16px;color:#ccc;font-weight:600">${ex}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <input id="sw_${ex.replace(/\s/g,"_")}" type="number" value="${S.weights[ex]}" step="5" min="0"
            style="width:80px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#f4f4f4;
            font-size:20px;font-weight:700;padding:10px 12px;text-align:right;font-family:inherit">
          <span style="font-size:15px;color:#666">lb</span>
        </div>
      </div>`).join("")}
    <button class="btn" onclick="finishSetup()">START PROGRAM</button>`;
}
function finishSetup(){
  Object.keys(DEFAULT_WEIGHTS).forEach(ex=>{
    const el=document.getElementById("sw_"+ex.replace(/\s/g,"_"));
    if(el)S.weights[ex]=parseInt(el.value)||DEFAULT_WEIGHTS[ex];
  });
  S.setupDone=true;view="home";persist();
}

// ═══════════════════════════════════════════
// HOME SCREEN
// ═══════════════════════════════════════════
function renderHome(){
  const wk=S.nextWorkout,exs=EXERCISES[wk];
  app().innerHTML=`
    <div style="text-align:center;margin-bottom:28px">
      <div class="logo">5×5</div>
      <div class="subtitle">STRONGLIFTS</div>
    </div>
    <!-- Profile selector -->
    <div class="card" style="padding:12px 16px">
      <div class="row">
        <div style="flex:1">
          <div class="label" style="margin-bottom:4px">PROFILE</div>
          <select id="profileSelect" onchange="switchProfile(this.value)"
            style="background:#1a1a1a;color:#f97316;border:1px solid #333;border-radius:8px;
            padding:8px 12px;font-size:16px;font-weight:700;font-family:inherit;width:100%">
            ${getProfiles().map(p=>`<option value="${p}" ${p===currentProfile?'selected':''}>${p}</option>`).join("")}
          </select>
        </div>
        <div style="display:flex;gap:6px;margin-left:10px;align-items:flex-end">
          <button class="btn ghost sm" onclick="createProfile()">+ NEW</button>
          ${currentProfile!=="default"?`<button class="btn ghost sm red" onclick="deleteProfile()">DEL</button>`:""}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="label">NEXT WORKOUT</div>
      <div class="tag" style="margin-bottom:16px">Workout ${wk} — #${S.workoutNumber}</div>
      ${exs.map(ex=>{const w=S.weights[ex],wu=buildWarmup(w,ex),sr=SETS_REPS[ex];return`
        <div class="row border" style="align-items:flex-start">
          <div style="flex:1">
            <div style="font-size:16px;color:#ddd;font-weight:600">${ex}</div>
            <div class="plates">${plates(w)}</div>
            ${wu.length?`<div style="font-size:13px;color:#444;margin-top:2px">Warmup: ${wu.map(s=>s.weight).join(" → ")} → ${w}</div>`:""}
          </div>
          <span style="font-size:15px;color:#888">${w} lb • ${sr.sets}×${sr.reps}</span>
        </div>`;}).join("")}
    </div>
    <div class="legend">
      <div class="label" style="margin-bottom:10px">HOW IT WORKS</div>
      <div class="row"><span style="color:${DC.easy}">🟢 EASY</span><span style="color:#aaa">Double increment</span></div>
      <div class="row"><span style="color:${DC.ok}">🟡 OK</span><span style="color:#aaa">Standard increment</span></div>
      <div class="row"><span style="color:${DC.hard}">🔴 HARD</span><span style="color:#aaa">Half increment</span></div>
      <p style="font-size:13px;color:#555;margin-top:8px;line-height:1.4">
        Warmup: bar only (&lt;100) • bar + 1 ramp (100-199) • bar + ramp sets (200+) • 60s warmup rest • 120s work rest • 3 fails = 10% deload</p>
    </div>
    ${(()=>{const p=loadProgress();if(p){
      const sets=p.setsLog?p.setsLog.reduce((a,l)=>a+(l?.setsCompleted?.length||0),0):0;
      const totalSets=EXERCISES[p.workout||S.nextWorkout].reduce((a,ex)=>a+SETS_REPS[ex].sets,0);
      const mins=Math.round((Date.now()-p.timestamp)/60000);
      const hrs=Math.floor(mins/60);
      const ago=hrs>0?`${hrs}h ${mins%60}m`:`${mins}m`;
      const pct=totalSets?Math.round(sets/totalSets*100):0;
      return`
        <div class="card" style="border:2px solid #f97316;position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;height:4px;background:#f97316;width:${pct}%;border-radius:2px"></div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;margin-top:4px">
            <div style="width:14px;height:14px;border-radius:50%;background:#f97316;animation:pulse 1.5s infinite"></div>
            <span style="font-size:16px;font-weight:800;color:#f97316">WORKOUT IN PROGRESS</span>
          </div>
          <div style="font-size:15px;color:#ccc;margin-bottom:4px">Workout ${p.workout||S.nextWorkout} #${p.workoutNumber||S.workoutNumber}</div>
          <div style="font-size:14px;color:#888">${sets}/${totalSets} working sets complete • ${ago} ago</div>
          <button class="btn" style="margin-top:12px" onclick="startWorkout(true)">RESUME</button>
          <button class="btn ghost" style="width:100%;margin-top:8px" onclick="clearProgress();render()">DISCARD</button>
        </div>`;
    } else {
      return`<button class="btn" onclick="startWorkout(false)">BEGIN WORKOUT</button>`;
    }})()}
    ${statusMsg?`<div class="status ${statusMsg.includes("!")?'ok':'info'}">${statusMsg}</div>`:""}
    <div style="text-align:center;margin-top:16px">
      <button class="btn ghost" onclick="setView('history')">HISTORY</button>
      <button class="btn ghost" onclick="setView('setup')">EDIT WEIGHTS</button>
      <button class="btn ghost red" onclick="if(confirm('Reset all data?')){S=freshState();persist();}">RESET</button>
    </div>
    <div class="overview">
      <div class="label" style="margin-bottom:12px">CURRENT WEIGHTS</div>
      ${Object.keys(S.weights).map(ex=>`
        <div class="row" style="font-size:16px">
          <span style="color:#aaa">${ex}</span>
          <div>
            <span style="color:#f4f4f4;font-weight:700">${S.weights[ex]} lb</span>
            ${S.failCounts[ex]>0?`<span style="color:#f97316;font-size:14px;margin-left:8px">${S.failCounts[ex]}/${MAX_FAILS} fails</span>`:""}
          </div>
        </div>`).join("")}
    </div>
    <div style="text-align:center;margin-top:20px;font-size:13px;color:#333">Data saved to this browser automatically</div>
    ${deferredInstall?`<button class="btn green" style="margin-top:12px" onclick="installApp()">INSTALL AS APP</button>`
      :`<div style="text-align:center;margin-top:8px;font-size:13px;color:#444">Tip: Use Chrome menu → Install app to add to home screen</div>`}`;
}

function startWorkout(resume){
  if(resume){
    const p=loadProgress();
    if(p){exIdx=p.exIdx||0;warmupIdx=p.warmupIdx||0;setsLog=p.setsLog||[];modal=null;
      view="workout";navPush();render();return;}
  }
  exIdx=0;warmupIdx=0;setsLog=[];modal=null;view="workout";navPush();render();
}

// ═══════════════════════════════════════════
// WORKOUT SCREEN
// ═══════════════════════════════════════════
function renderWorkout(){
  const wk=S.nextWorkout,exs=EXERCISES[wk],curEx=exs[exIdx],workWt=S.weights[curEx];
  const {sets:ts,reps:tr}=SETS_REPS[curEx];
  const wuSets=buildWarmup(workWt,curEx);
  const log=setsLog[exIdx]||{name:curEx,weight:workWt,setsCompleted:[],difficulties:[],warmupSets:wuSets,warmupDone:wuSets.length===0};
  const wuDone=log.warmupDone,wc=log.setsCompleted.length,allDone=exIdx>=exs.length-1&&wc>=ts;

  let actionHtml="";
  if(!allDone){
    if(!wuDone&&warmupIdx<wuSets.length){
      const lbl=warmupIdx===0?`WARMUP: ${curEx.toUpperCase()}`:`WARMUP ${warmupIdx+1}/${wuSets.length}`;
      actionHtml=`<button class="btn" onclick="showWarmup()">${lbl}</button>`;
    } else {
      actionHtml=`<button class="btn" onclick="showFeedback()">WORKING SET ${wc+1}/${ts}</button>`;
    }
  }

  let modalHtml="";
  if(modal==="warmup")modalHtml=renderWarmupModal(curEx,wuSets[warmupIdx],warmupIdx,wuSets.length);
  else if(modal==="feedback")modalHtml=renderFeedbackModal(curEx,wc+1,ts,tr,workWt);
  else if(modal==="timer")modalHtml=renderTimerModal();

  // Calculate overall progress
  const totalWorkSets=exs.reduce((a,ex)=>a+SETS_REPS[ex].sets,0);
  const doneSets=setsLog.reduce((a,l)=>a+(l?.setsCompleted?.length||0),0);
  const pct=totalWorkSets?Math.round(doneSets/totalWorkSets*100):0;

  app().innerHTML=`
    ${modalHtml}
    <div style="margin-bottom:16px">
      <div class="row">
        <div><span class="tag">WORKOUT ${wk}</span>
          <div style="font-size:13px;color:#555;margin-top:2px">${currentProfile}</div></div>
        <div style="text-align:right">
          <span style="font-size:16px;color:#555">#${S.workoutNumber}</span>
          <div style="font-size:13px;color:#888;margin-top:2px">${doneSets}/${totalWorkSets} sets</div>
        </div>
      </div>
      <div style="margin-top:8px;height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct>=100?'#4ade80':'#f97316'};border-radius:3px;transition:width 0.3s"></div>
      </div>
    </div>
    ${exs.map((ex,ei)=>{const{sets:ets,reps:etr}=SETS_REPS[ex],elog=setsLog[ei],
      edone=elog&&elog.setsCompleted.length>=ets,isCur=ei===exIdx,w=S.weights[ex],
      ews=buildWarmup(w,ex),ewuD=elog?.warmupDone;
      return`<div class="card ${isCur?'active':edone?'done':''} ${ei>exIdx?'dim':''}">
        <div class="row" style="margin-bottom:8px">
          <div><div class="exname">${ex}</div><div class="exdet">${w} lb — ${ets}×${etr}</div>
            <div class="plates">${plates(w)}</div></div>
          ${edone?'<span style="font-size:26px">✅</span>':""}
        </div>
        ${ews.length?`<div class="warmbar"><span style="font-size:12px;letter-spacing:1px;color:#555;margin-right:6px">WARMUP</span>
          ${ews.map((_,wi)=>{let f=ei<exIdx||(ei===exIdx&&ewuD)||(ei===exIdx&&!ewuD&&wi<warmupIdx);
            return`<div class="pip ${f?'done':''}"></div>`;}).join("")}
          ${ewuD||ei<exIdx?'<span style="font-size:12px;color:#4ade80;margin-left:4px">✓</span>':""}</div>`:""}
        <div class="dots">${Array.from({length:ets}).map((_,si)=>{
          const rep=elog?.setsCompleted[si],dif=elog?.difficulties?.[si],ic=rep!==undefined;
          let cls=ic?(rep===etr?"g":rep>0?"o":"r"):(isCur&&si===(elog?.setsCompleted?.length||0)?"cur":"empty");
          return`<div style="text-align:center"><div class="dot ${cls}">${ic?rep:si+1}</div>
            ${ic&&dif?`<div style="font-size:11px;margin-top:2px;color:${DC[dif]};font-weight:700">${DL[dif]}</div>`:""}</div>`;
        }).join("")}</div>
      </div>`;}).join("")}
    ${actionHtml}`;
}

function showWarmup(){const wk=S.nextWorkout,ex=EXERCISES[wk][exIdx],wt=S.weights[ex],ws=buildWarmup(wt,ex);
  mWt=ws[warmupIdx].weight;modal="warmup";navPush();render();}
function showFeedback(){const wk=S.nextWorkout,ex=EXERCISES[wk][exIdx];
  mWt=S.weights[ex];mReps=SETS_REPS[ex].reps;mDiff="ok";modal="feedback";navPush();render();}

function renderWarmupModal(ex,si,num,total){
  return`<div class="overlay"><div class="modal">
    <div class="title">WARMUP ${num+1}/${total}</div>
    <div class="exname">${ex}</div>
    <div class="adjrow" style="margin-top:12px">
      <button class="adjbtn" onclick="mWt=Math.max(${BAR},mWt-5);render()">−</button>
      <div style="text-align:center"><div class="big">${mWt} lb</div>
        <div class="sub">${loadInfo(mWt)}</div></div>
      <button class="adjbtn" onclick="mWt+=5;render()">+</button>
    </div>
    <div class="med">${si.reps} reps</div>
    <button class="btn" onclick="doneWarmup()">DONE</button>
  </div></div>`;}

function renderFeedbackModal(ex,setNum,totalSets,targetReps,weight){
  return`<div class="overlay"><div class="modal">
    <div class="title">WORKING SET ${setNum}/${totalSets}</div>
    <div class="exname">${ex}</div>
    <div class="adjrow" style="margin-top:12px">
      <button class="adjbtn" onclick="mWt=Math.max(${BAR},mWt-5);render()">−</button>
      <div style="text-align:center"><div style="font-size:34px;font-weight:900">${mWt} lb</div>
        <div class="sub">${loadInfo(mWt)}</div></div>
      <button class="adjbtn" onclick="mWt+=5;render()">+</button>
    </div>
    <p style="font-size:16px;color:#888;margin:14px 0 8px">How many reps?</p>
    <div class="reprow">${[0,1,2,3,4,5].map(r=>{
      const sel=mReps===r,full=r===targetReps;
      return`<button class="repbtn ${sel?(full?'sel':'sel partial'):''}" onclick="mReps=${r};render()">${r}</button>`;
    }).join("")}</div>
    <p style="font-size:16px;color:#888;margin:8px 0">How did it feel?</p>
    <div class="diffrow">${["easy","ok","hard"].map(v=>{
      const sel=mDiff===v;
      return`<button class="diffbtn ${sel?'sel':''}" style="${sel?`background:${DC[v]};border-color:${DC[v]}`:''}"
        onclick="mDiff='${v}';render()">${DI[v]} ${DL[v]}</button>`;}).join("")}</div>
    <button class="btn" onclick="logWorkSet()">LOG SET</button>
  </div></div>`;}

// ═══════════════════════════════════════════
// WAKE LOCK & AUDIO CHIME
// ═══════════════════════════════════════════
let wakeLock=null;
async function acquireWake(){
  try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen');}}catch(e){console.log('Wake lock failed',e);}
}
function releaseWake(){if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null;}}
// Re-acquire on visibility change (Chrome releases it when tab hidden)
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&timerInterval)acquireWake();});

function playChime(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Two-tone chime: C5 then E5
    [[523.25,0],[659.25,0.15]].forEach(([freq,delay])=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.type='sine';osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.4,ctx.currentTime+delay);
      gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+delay+0.4);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+0.5);
    });
    setTimeout(()=>ctx.close(),1000);
  }catch(e){console.log('Audio failed',e);}
}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
let timerSecs=0,timerLabel="",timerNext=null,timerOnDone=null;
function startTimer(secs,label,next,onDone){
  timerSecs=secs;timerLeft=secs;timerLabel=label;timerNext=next;timerOnDone=onDone;
  modal="timer";navPush();render();
  acquireWake();
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerLeft--;
    if(timerLeft<=0){clearInterval(timerInterval);timerInterval=null;
      playChime();releaseWake();
      setTimeout(()=>{modal=null;if(timerOnDone)timerOnDone();render();},600);}
    render();
  },1000);
}
function skipTimer(){if(timerInterval)clearInterval(timerInterval);timerInterval=null;
  releaseWake();modal=null;if(timerOnDone)timerOnDone();render();}

function renderTimerModal(){
  const pct=((timerSecs-timerLeft)/timerSecs)*100,done=timerLeft<=0;
  const c=done?"#4ade80":"#f97316",off=2*Math.PI*52*(1-pct/100);
  let nextHtml="";
  if(timerNext){const n=timerNext;
    nextHtml=`<div class="nextbox"><div class="nlabel">UP NEXT</div>
      <div class="nexname">${n.exercise}</div><div class="nset">${n.setLabel}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <span class="nwt">${n.weight} lb</span><span style="font-size:14px;color:#666">${n.reps} reps</span></div>
      <div class="nplates">${loadInfo(n.weight)}</div></div>`;}
  return`<div class="overlay"><div class="modal">
    <div class="title">${timerLabel}</div>
    <div class="ring-wrap">
      <svg viewBox="0 0 120 120" width="140" height="140">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#2a2a2a" stroke-width="8"/>
        <circle cx="60" cy="60" r="52" fill="none" stroke="${c}" stroke-width="8"
          stroke-dasharray="${2*Math.PI*52}" stroke-dashoffset="${off}" stroke-linecap="round"
          transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 1s linear,stroke 0.3s"/>
      </svg>
      <span class="ring-digits" style="color:${done?'#4ade80':'#f4f4f4'}">${fmtT(Math.max(0,timerLeft))}</span>
    </div>
    ${nextHtml}
    ${done?'<p style="color:#4ade80;font-size:16px;font-weight:700;letter-spacing:2px;margin-top:8px">GO!</p>'
      :`<button class="btn ghost" style="margin-top:8px" onclick="skipTimer()">SKIP</button>`}
  </div></div>`;}

// ═══════════════════════════════════════════
// WORKOUT HANDLERS
// ═══════════════════════════════════════════
function doneWarmup(){
  const wk=S.nextWorkout,exs=EXERCISES[wk],curEx=exs[exIdx],wt=S.weights[curEx];
  const ws=buildWarmup(wt,curEx),{sets:ts,reps:tr}=SETS_REPS[curEx];
  const next=warmupIdx+1;
  modal=null;
  if(next>=ws.length){
    const log=setsLog[exIdx]||{name:curEx,weight:wt,setsCompleted:[],difficulties:[],warmupSets:ws,warmupDone:false};
    log.warmupDone=true;setsLog[exIdx]=log;warmupIdx=0;
    saveProgress();
    const ni={exercise:curEx,weight:wt,reps:tr,setLabel:`Working Set 1/${ts}`};
    startTimer(REST_WORK,"REST",ni,()=>{modal=null;showFeedback();});
  } else {
    warmupIdx=next;const nw=ws[next];
    saveProgress();
    const ni={exercise:curEx,weight:nw.weight,reps:nw.reps,setLabel:`Warmup ${next+1}/${ws.length}`};
    startTimer(REST_WARMUP,"WARMUP REST",ni,()=>{modal=null;showWarmup();});
  }
}

function logWorkSet(){
  const wk=S.nextWorkout,exs=EXERCISES[wk],curEx=exs[exIdx],wt=S.weights[curEx];
  const{sets:ts,reps:tr}=SETS_REPS[curEx];
  if(mWt&&mWt!==wt){S.weights[curEx]=mWt;save(S);}
  const effectiveWt=mWt||wt;
  const ws=buildWarmup(effectiveWt,curEx);
  const log=setsLog[exIdx]||{name:curEx,weight:effectiveWt,setsCompleted:[],difficulties:[],warmupSets:ws,warmupDone:true};
  log.setsCompleted.push(mReps);log.difficulties.push(mDiff);log.weight=effectiveWt;log.warmupDone=true;log.warmupSets=ws;
  setsLog[exIdx]=log;
  saveProgress(); // Auto-save in case of accidental exit
  modal=null;
  const nc=log.setsCompleted.length,last=nc>=ts,lastEx=exIdx>=exs.length-1;
  if(last&&lastEx){
    summaryData={workout:wk,workoutNumber:S.workoutNumber,date:today(),exercises:[...setsLog]};
    view="summary";render();
  } else if(last){
    const nxi=exIdx+1,nex=exs[nxi],nwt=S.weights[nex],nw=buildWarmup(nwt,nex),nsr=SETS_REPS[nex];
    const hasWu=nw.length>0;
    const ni=hasWu?{exercise:nex,weight:nw[0].weight,reps:nw[0].reps,setLabel:`Warmup 1/${nw.length}`}
      :{exercise:nex,weight:nwt,reps:nsr.reps,setLabel:`Working Set 1/${nsr.sets}`};
    startTimer(REST_WORK,"REST",ni,()=>{exIdx=nxi;warmupIdx=0;modal=null;
      if(hasWu)showWarmup();else showFeedback();});
  } else {
    const ni={exercise:curEx,weight:effectiveWt,reps:tr,setLabel:`Working Set ${nc+1}/${ts}`};
    startTimer(REST_WORK,"REST",ni,()=>{modal=null;showFeedback();});
  }
}

// ═══════════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════════
function renderSummary(){
  if(!summaryData){view="home";render();return;}
  const d=summaryData,allOk=d.exercises.every(e=>e.setsCompleted.every(r=>r===SETS_REPS[e.name].reps));
  app().innerHTML=`
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:52px;margin-bottom:8px">${allOk?"💪":"📋"}</div>
      <h1 style="font-size:24px">WORKOUT ${d.workout} #${d.workoutNumber}</h1>
      <p style="font-size:15px;color:#666;margin-bottom:4px">${d.date}</p>
      <p style="font-size:16px;font-weight:700;color:${allOk?'#4ade80':'#f97316'}">${allOk?"ALL SETS COMPLETED":"SOME SETS MISSED"}</p>
    </div>
    ${d.exercises.map(ex=>{const target=SETS_REPS[ex.name].reps,dm=domDiff(ex.difficulties||[]),
      ag=ex.setsCompleted.every(r=>r===target),base=INCREMENT[ex.name],
      eff=ag?(r5(base*DM[dm])||5):0;
      return`<div class="sumcard">
        <div class="row"><div><div style="font-size:17px;font-weight:700;color:#ddd">${ex.name}</div>
          <div style="font-size:15px;color:#777;margin-top:2px">${ex.weight} lb • ${plates(ex.weight)}</div></div>
          <span class="difftag" style="color:${DC[dm]};border:1px solid ${DC[dm]}33">${DI[dm]} ${DL[dm]}</span></div>
        <div style="display:flex;gap:6px;margin-top:8px">${ex.setsCompleted.map((r,i)=>{
          const cls=r===target?"g":r>0?"o":"r",df=ex.difficulties?.[i];
          return`<div style="text-align:center"><span class="sdot ${cls}">${r}</span>
            ${df?`<div class="diflabel" style="color:${DC[df]}">${DL[df]}</div>`:""}</div>`;}).join("")}</div>
        <p style="font-size:15px;color:#888;margin-top:8px">${ag
          ?`✅ +${eff} lb next → ${ex.weight+eff} lb${dm==="easy"?" (easy → bigger jump)":dm==="hard"?" (hard → smaller jump)":""}`
          :`⏸ Repeat ${ex.weight} lb next time`}</p>
      </div>`;}).join("")}
    <button class="btn" onclick="finishWorkout()">DONE</button>`;
}

function finishWorkout(){
  if(!summaryData)return;
  summaryData.exercises.forEach(ex=>{
    const t=SETS_REPS[ex.name].reps,ok=ex.setsCompleted.every(r=>r===t);
    if(ok){const dm=domDiff(ex.difficulties||[]);S.weights[ex.name]+=(r5(INCREMENT[ex.name]*DM[dm])||5);S.failCounts[ex.name]=0;}
    else{S.failCounts[ex.name]=(S.failCounts[ex.name]||0)+1;
      if(S.failCounts[ex.name]>=MAX_FAILS){S.weights[ex.name]=r5(S.weights[ex.name]*DELOAD);S.failCounts[ex.name]=0;}}
  });
  S.nextWorkout=S.nextWorkout==="A"?"B":"A";S.workoutNumber++;
  S.history.push(summaryData);summaryData=null;
  statusMsg="Workout saved!";setTimeout(()=>{statusMsg="";render();},3000);
  clearProgress();view="home";persist();
}

// ═══════════════════════════════════════════
// PWA: Service Worker + Install Prompt
// ═══════════════════════════════════════════
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW reg failed',e));
}
let deferredInstall=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredInstall=e;
  // Show install banner on home screen
  setTimeout(()=>{if(view==="home")render();},500);
});
function installApp(){
  if(deferredInstall){deferredInstall.prompt();
    deferredInstall.userChoice.then(r=>{deferredInstall=null;render();});}
}

history.replaceState({d:0},""," "); // Base state — back from here closes app
