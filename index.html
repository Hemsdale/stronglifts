<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>5×5 Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f4f4f4;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  min-height:100vh;max-width:480px;margin:0 auto;padding:16px 16px 40px;-webkit-tap-highlight-color:transparent}
.logo{font-size:44px;font-weight:900;color:#f97316;letter-spacing:-2px;text-align:center}
.subtitle{font-size:17px;letter-spacing:6px;color:#666;font-weight:600;text-align:center;margin-top:4px}
h1{font-size:20px;font-weight:800;letter-spacing:2px;margin-bottom:8px}
.card{background:#111;border:1px solid #222;border-radius:12px;padding:18px;margin-bottom:14px}
.card.active{border:2px solid #f97316}
.card.done{border-color:#4ade8033}
.card.started{border-color:#f9731644}
.card.dim{opacity:0.4}
.btn{display:block;width:100%;padding:18px;background:#f97316;color:#0a0a0a;border:none;border-radius:12px;
  font-size:18px;font-weight:800;letter-spacing:1.5px;cursor:pointer;font-family:inherit;margin-top:10px;text-align:center}
.btn.green{background:#4ade80}
.btn.ghost{background:none;border:1px solid #333;color:#888;padding:12px 18px;border-radius:8px;
  font-size:14px;width:auto;display:inline-block;margin:4px}
.btn.ghost.green{color:#4ade80;border-color:#4ade8044}
.btn.ghost.red{color:#ef4444;border-color:#ef444444}
.btn.ghost.sm{padding:8px 14px;font-size:13px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.row.border{border-top:1px solid #1a1a1a}
.label{font-size:13px;letter-spacing:2px;color:#666;margin-bottom:4px}
.tag{font-size:22px;font-weight:800;color:#f97316}
.exname{font-size:18px;font-weight:800}
.exdet{font-size:15px;color:#777;margin-top:3px}
.plates{font-size:13px;color:#555;margin-top:2px}
.dots{display:flex;gap:10px;margin-top:8px}
.dot{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;border:2px solid transparent}
.dot.g{background:#4ade80;color:#0a0a0a}.dot.o{background:#f97316;color:#0a0a0a}
.dot.r{background:#ef4444;color:#0a0a0a}.dot.empty{background:#1a1a1a}
.dot.cur{background:#333;border-color:#f97316}
.warmbar{display:flex;align-items:center;margin-bottom:8px;gap:3px}
.warmbar .pip{width:12px;height:12px;border-radius:3px;background:#1a1a1a;border:1px solid #333}
.warmbar .pip.done{background:#555}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;
  justify-content:center;z-index:100;padding:20px}
.modal{text-align:center;width:100%;max-width:340px}
.modal .title{font-size:17px;letter-spacing:4px;color:#666;margin-bottom:20px;font-weight:700}
.modal .exname{font-size:22px;color:#f97316;margin-bottom:6px}
.modal .big{font-size:44px;font-weight:900}
.modal .med{font-size:18px;color:#f97316;font-weight:700;margin-top:6px}
.modal .sub{font-size:14px;color:#888;margin-top:2px}
.modal .platesbox{margin-top:10px;padding:8px 12px;background:#1a1a1a;border-radius:8px;display:inline-block}
.modal .platesbox .lbl{font-size:14px;color:#888;letter-spacing:1px}
.modal .platesbox .val{font-size:16px;color:#ccc;font-weight:600;margin-top:2px}
.reprow{display:flex;gap:6px;justify-content:center;margin:14px 0}
.repbtn{width:46px;height:46px;border-radius:10px;border:2px solid #333;font-size:20px;font-weight:800;
  cursor:pointer;font-family:inherit;background:#1e1e1e;color:#888}
.repbtn.sel{background:#4ade80;color:#0a0a0a;border-color:#4ade80}
.repbtn.sel.partial{background:#f97316;border-color:#f97316}
.diffrow{display:flex;gap:10px;justify-content:center;margin:14px 0}
.diffbtn{flex:1;max-width:100px;padding:12px 8px;border-radius:12px;border:2px solid #333;font-size:15px;
  cursor:pointer;font-family:inherit;background:#1e1e1e;color:#777}
.diffbtn.sel{font-weight:900;color:#0a0a0a}
.adjrow{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
.adjbtn{background:none;border:1px solid #f9731644;color:#f97316;padding:8px 14px;border-radius:8px;
  font-size:20px;font-weight:900;cursor:pointer;font-family:inherit}
.ring-wrap{position:relative;display:inline-block;margin-bottom:20px}
.ring-digits{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:900}
.nextbox{background:#1a1a1a;border-radius:10px;padding:12px;margin-top:8px;text-align:left}
.nextbox .nlabel{font-size:13px;color:#666;letter-spacing:1px;margin-bottom:4px}
.nextbox .nexname{font-size:17px;font-weight:800}
.nextbox .nset{font-size:14px;color:#888;margin-top:2px}
.nextbox .nwt{font-size:24px;font-weight:900;color:#f97316;margin-top:6px}
.nextbox .nplates{font-size:13px;color:#555;margin-top:4px}
.status{text-align:center;padding:10px 14px;background:#111;border-radius:8px;border:1px solid #222;margin-top:12px;font-size:14px}
.status.ok{color:#4ade80}.status.err{color:#ef4444}.status.info{color:#777}
.overview{margin-top:24px;background:#111;border-radius:12px;padding:18px;border:1px solid #1a1a1a}
.legend{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:16px;margin-bottom:16px}
textarea{width:100%;min-height:80px;background:#1a1a1a;color:#f4f4f4;border:1px solid #333;border-radius:8px;
  padding:10px;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box}
.histcard{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:16px;margin-bottom:12px}
.sumcard{background:#111;border-radius:12px;padding:16px;margin-bottom:10px}
.difftag{font-size:14px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block}
.sdot{width:34px;height:34px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#0a0a0a}
.sdot.g{background:#4ade80}.sdot.o{background:#f97316}.sdot.r{background:#ef4444}
.diflabel{font-size:12px;margin-top:2px}
.hidden{display:none}
@media(prefers-color-scheme:dark){:root{color-scheme:dark}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const EXERCISES={A:["Squat","Bench Press","Barbell Row"],B:["Squat","Overhead Press","Deadlift"]};
const SETS_REPS={Squat:{sets:5,reps:5},"Bench Press":{sets:5,reps:5},"Barbell Row":{sets:5,reps:5},"Overhead Press":{sets:5,reps:5},Deadlift:{sets:1,reps:5}};
const INCREMENT={Squat:5,"Bench Press":5,"Barbell Row":5,"Overhead Press":5,Deadlift:10};
const DEFAULT_WEIGHTS={Squat:45,"Bench Press":45,"Barbell Row":65,"Overhead Press":45,Deadlift:95};
const BAR=45,DELOAD=0.9,MAX_FAILS=3,REST_WORK=120,REST_WARMUP=60,SKEY="5x5-tracker-data";
const RACK=[65,95,135,185,225,275,315,365,405,455,495];
const DC={easy:"#4ade80",ok:"#f97316",hard:"#ef4444"};
const DL={easy:"EASY",ok:"OK",hard:"HARD"};
const DI={easy:"🟢",ok:"🟡",hard:"🔴"};
const DM={easy:2,ok:1,hard:0.5};

// ═══════════════════════════════════════════
// UTIL
// ═══════════════════════════════════════════
const r5=n=>Math.round(n/5)*5;
const fmtT=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;
const today=()=>new Date().toISOString().slice(0,10);
function domDiff(a){if(!a||!a.length)return"ok";const c={easy:0,ok:0,hard:0};a.forEach(r=>c[r]++);
  if(c.hard>=Math.ceil(a.length/2))return"hard";if(c.easy>a.length/2)return"easy";return"ok";}
function plates(t){if(t<=BAR)return"empty bar";let rem=(t-BAR)/2;const ps=[45,35,25,10,5,2.5],res=[];
  for(const p of ps)while(rem>=p){res.push(p);rem-=p;}if(!res.length)return"empty bar";
  const ct={};res.forEach(p=>ct[p]=(ct[p]||0)+1);
  return Object.entries(ct).map(([p,c])=>c>1?`${c}×${p}`:`${p}`).join(" + ")+" /side";}
function loadInfo(w){return w<=BAR?"Empty bar":`${BAR} lb bar + ${plates(w)}`;}
function buildWarmup(wt,ex){
  // Deadlift: starts at 135 (needs plates for floor height), only 1×5 working set
  // Warmup IS your volume. Hit every rack stop, no jumps > ~50lb, reps taper down.
  if(ex==="Deadlift"||ex==="Barbell Row"){
    const minStart=ex==="Deadlift"?135:65;// Rows can start lighter
    if(wt<=minStart)return[];
    const s=[];
    // All rack stops from minStart up to (but not including) working weight
    const stops=RACK.filter(w=>w>=minStart&&w<wt);
    if(!stops.length){s.push({weight:minStart,reps:5});return s;}
    // Fill gaps: if any jump between consecutive stops > 50lb, add midpoint
    const filled=[stops[0]];
    for(let i=1;i<stops.length;i++){
      if(stops[i]-filled[filled.length-1]>50){
        filled.push(r5((filled[filled.length-1]+stops[i])/2));
      }
      filled.push(stops[i]);
    }
    // Assign reps: position-based taper
    // Short ramps (1-2 sets): all 5 reps
    // Longer ramps: 5s early, 3s middle, 2s near working weight
    filled.forEach((w,i)=>{
      const remaining=filled.length-i;
      let reps=5;
      if(filled.length>=4&&remaining<=2)reps=2;
      else if(filled.length>=3&&remaining===1)reps=2;
      else if(filled.length>=3&&remaining<=Math.ceil(filled.length/2))reps=3;
      s.push({weight:w,reps});
    });
    return s;
  }
  // All other lifts: standard warmup
  if(wt<=BAR)return[];const s=[{weight:BAR,reps:5}];if(wt<100)return s;
  if(wt<200){const cap=wt*0.75,av=RACK.filter(w=>w>BAR&&w<=cap);
    if(av.length)s.push({weight:av[av.length-1],reps:5});return s;}
  const cap=wt*0.85,av=RACK.filter(w=>w>BAR&&w<=cap);if(!av.length)return s;
  let pk;if(av.length<=3)pk=av;else{pk=[av[0],av[Math.floor(av.length/2)],av[av.length-1]];pk=[...new Set(pk)];}
  [5,3,2].forEach((r,i)=>{if(pk[i])s.push({weight:pk[i],reps:r});});return s;}
function freshState(){return{nextWorkout:"A",weights:{...DEFAULT_WEIGHTS},
  failCounts:{Squat:0,"Bench Press":0,"Barbell Row":0,"Overhead Press":0,Deadlift:0},
  history:[],workoutNumber:1,setupDone:false,lastWorkoutDate:null,deloadDismissed:null};}

// ═══════════════════════════════════════════
// TIME-OFF DELOAD
// ═══════════════════════════════════════════
function daysSinceLastWorkout(){
  // Check lastWorkoutDate first, fall back to last history entry
  let d=S.lastWorkoutDate;
  if(!d&&S.history.length){d=S.history[S.history.length-1].date;}
  if(!d)return 0;
  // Parse as local date (YYYY-MM-DD) to avoid timezone offset issues
  const parts=d.split("-");
  const last=new Date(+parts[0],+parts[1]-1,+parts[2]);
  const now=new Date();now.setHours(0,0,0,0);
  return Math.max(0,Math.floor((now-last)/(1000*60*60*24)));
}
function suggestedDeloadPct(){
  const days=daysSinceLastWorkout();
  if(days<7)return 0;
  if(days<=14)return 10;
  if(days<=21)return 15;
  if(days<=42)return 20;
  return 30;
}
function calcDeloadWeights(pct){
  const result={};
  Object.keys(S.weights).forEach(ex=>{
    const reduced=r5(S.weights[ex]*(1-pct/100));
    result[ex]=Math.max(reduced,DEFAULT_WEIGHTS[ex]);
  });
  return result;
}
function needsDeload(){
  if(!S.setupDone)return false;
  // Need a date to compare against — either explicit or from history
  const hasDate=S.lastWorkoutDate||(S.history.length&&S.history[S.history.length-1].date);
  if(!hasDate)return false;
  if(S.deloadDismissed===today())return false;
  return daysSinceLastWorkout()>=7;
}
let deloadPct=-1; // -1 = unset, will be initialized from suggestion
function applyDeload(){
  const pct=deloadPct;
  const newWts=calcDeloadWeights(pct);
  Object.keys(newWts).forEach(ex=>{S.weights[ex]=newWts[ex];});
  Object.keys(S.failCounts).forEach(ex=>{S.failCounts[ex]=0;});
  S.deloadDismissed=today();
  deloadPct=-1;
  statusMsg=`Deloaded ${pct}% — welcome back!`;
  setTimeout(()=>{statusMsg="";render();},4000);
  persist();
}
function skipDeload(){
  S.deloadDismissed=today();
  deloadPct=-1;
  persist();
}

// ═══════════════════════════════════════════
// STORAGE (localStorage — profile-based)
// ═══════════════════════════════════════════
const PROFILES_KEY="5x5-profiles";
function getProfiles(){try{return JSON.parse(localStorage.getItem(PROFILES_KEY))||[];}catch{return[];}}
function saveProfiles(list){localStorage.setItem(PROFILES_KEY,JSON.stringify(list));}
let currentProfile="default";
function profileKey(){return SKEY+"-"+currentProfile;}
function save(st){try{localStorage.setItem(profileKey(),JSON.stringify(st));return true;}catch(e){console.error(e);return false;}}
function load(){
  // Try profile key first
  try{const d=localStorage.getItem(profileKey());if(d){const p=JSON.parse(d);
    return{...freshState(),...p,weights:{...DEFAULT_WEIGHTS,...(p.weights||{})},
      failCounts:{...freshState().failCounts,...(p.failCounts||{})}};}
  }catch(e){console.error(e);}
  // Migrate from old non-profile key
  if(currentProfile==="default"){
    try{const d=localStorage.getItem(SKEY);if(d){const p=JSON.parse(d);
      const migrated={...freshState(),...p,weights:{...DEFAULT_WEIGHTS,...(p.weights||{})},
        failCounts:{...freshState().failCounts,...(p.failCounts||{})}};
      localStorage.setItem(profileKey(),JSON.stringify(migrated));
      return migrated;}}catch{}
  }
  return null;
}
function switchProfile(name){
  currentProfile=name;S=load()||freshState();
  view=S.setupDone?"home":"setup";exIdx=0;warmupIdx=0;setsLog=[];modal=null;summaryData=null;
  render();
}
function createProfile(){
  const name=prompt("Enter profile name:");
  if(!name||!name.trim())return;
  const clean=name.trim().toLowerCase().replace(/[^a-z0-9]/g,"-");
  const profiles=getProfiles();
  if(!profiles.includes(clean)){profiles.push(clean);saveProfiles(profiles);}
  switchProfile(clean);
}
function deleteProfile(){
  if(currentProfile==="default"){alert("Can't delete default profile");return;}
  if(!confirm(`Delete profile "${currentProfile}" and all its data?`))return;
  localStorage.removeItem(profileKey());
  const profiles=getProfiles().filter(p=>p!==currentProfile);
  saveProfiles(profiles);switchProfile("default");
}

// ═══════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════
// Ensure default profile exists
{const p=getProfiles();if(!p.includes("default")){p.unshift("default");saveProfiles(p);}}
let S=load()||freshState();
let view="home",exIdx=0,warmupIdx=0,setsLog=[],modal=null,summaryData=null;
let timerInterval=null,timerLeft=0,statusMsg="";
// temp state for modals
let mReps=5,mDiff="ok",mWt=0;

function persist(){save(S);render();}

// ═══════════════════════════════════════════
// NAVIGATION STACK (history API for back button)
// ═══════════════════════════════════════════
let navDepth=0; // Track how many states we've pushed
function navPush(){navDepth++;history.pushState({d:navDepth},""," ");}
function setView(v){
  view=v;
  if(v!=="home")navPush();
  render();
}

function isWorkoutActive(){return view==="workout"||view==="summary";}

// Save/load in-progress workout
function saveProgress(){
  if(!isWorkoutActive())return;
  try{localStorage.setItem(profileKey()+"-progress",JSON.stringify({
    exIdx,warmupIdx,setsLog,workout:S.nextWorkout,workoutNumber:S.workoutNumber,
    view,timestamp:Date.now()
  }));}catch{}
}
function loadProgress(){
  try{const d=localStorage.getItem(profileKey()+"-progress");
    if(!d)return null;const p=JSON.parse(d);
    if(Date.now()-p.timestamp>4*60*60*1000){clearProgress();return null;}
    return p;
  }catch{return null;}
}
function clearProgress(){try{localStorage.removeItem(profileKey()+"-progress");}catch{}}

// Handle back gesture / hardware back
function handleBack(){
  // 1. Any overlay modal open → close it
  if(modal){
    if(modal==="timer"){skipTimer();}
    else{modal=null;}
    navPush();render();return;
  }
  // 2. Workout or summary → save progress, go home
  if(view==="workout"){saveProgress();view="home";navPush();render();return;}
  if(view==="summary"){saveProgress();view="home";navPush();render();return;}
  // 3. History/setup → go home
  if(view==="history"||view==="setup"){view="home";navPush();render();return;}
  // 4. Home → close app
}

window.addEventListener('popstate',e=>{
  // Only intercept if we have states to unwind
  if(navDepth>0){navDepth--;handleBack();}
});

// Refresh / close tab — save progress
window.addEventListener('beforeunload',e=>{
  if(isWorkoutActive()){saveProgress();}
});

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
const $=id=>document.getElementById(id);
const app=()=>document.getElementById("app");

function render(){
  if(!S.setupDone&&view!=="setup"){view="setup";}
  if(view==="setup")renderSetup();
  else if(view==="history")renderHistory();
  else if(view==="summary")renderSummary();
  else if(view==="workout")renderWorkout();
  else renderHome();
}

// ═══════════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════════
function renderSetup(){
  const exs=Object.keys(DEFAULT_WEIGHTS);
  app().innerHTML=`
    <div style="text-align:center;margin-bottom:28px">
      <div class="logo">5×5</div>
      <h1>SET YOUR STARTING WEIGHTS</h1>
      <p style="font-size:15px;color:#f97316;margin-bottom:4px">Profile: ${currentProfile}</p>
      <p style="font-size:15px;color:#777">New lifter? Use defaults. Returning? Enter a weight you can do for 10 reps.</p>
    </div>
    ${exs.map(ex=>`
      <div class="row border">
        <span style="font-size:16px;color:#ccc;font-weight:600">${ex}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <input id="sw_${ex.replace(/\s/g,"_")}" type="number" value="${S.weights[ex]}" step="5" min="0"
            style="width:80px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#f4f4f4;
            font-size:20px;font-weight:700;padding:10px 12px;text-align:right;font-family:inherit">
          <span style="font-size:15px;color:#666">lb</span>
        </div>
      </div>`).join("")}
    <button class="btn" onclick="finishSetup()">START PROGRAM</button>`;
}
function finishSetup(){
  Object.keys(DEFAULT_WEIGHTS).forEach(ex=>{
    const el=document.getElementById("sw_"+ex.replace(/\s/g,"_"));
    if(el)S.weights[ex]=parseInt(el.value)||DEFAULT_WEIGHTS[ex];
  });
  S.setupDone=true;view="home";persist();
}

// ═══════════════════════════════════════════
// HOME SCREEN
// ═══════════════════════════════════════════
function renderHome(){
  const wk=S.nextWorkout,exs=EXERCISES[wk];
  app().innerHTML=`
    <div style="text-align:center;margin-bottom:28px">
      <div class="logo">5×5</div>
      <div class="subtitle">STRONGLIFTS</div>
    </div>
    <!-- Profile selector -->
    <div class="card" style="padding:12px 16px">
      <div class="row">
        <div style="flex:1">
          <div class="label" style="margin-bottom:4px">PROFILE</div>
          <select id="profileSelect" onchange="switchProfile(this.value)"
            style="background:#1a1a1a;color:#f97316;border:1px solid #333;border-radius:8px;
            padding:8px 12px;font-size:16px;font-weight:700;font-family:inherit;width:100%">
            ${getProfiles().map(p=>`<option value="${p}" ${p===currentProfile?'selected':''}>${p}</option>`).join("")}
          </select>
        </div>
        <div style="display:flex;gap:6px;margin-left:10px;align-items:flex-end">
          <button class="btn ghost sm" onclick="createProfile()">+ NEW</button>
          ${currentProfile!=="default"?`<button class="btn ghost sm red" onclick="deleteProfile()">DEL</button>`:""}
        </div>
      </div>
    </div>
    ${(()=>{
      if(!needsDeload())return"";
      const days=daysSinceLastWorkout();
